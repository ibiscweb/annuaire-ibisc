<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Annuaire IBISC — Université Évry Paris-Saclay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ VARIABLES CHARTE ÉVRY ═══════════════════════════════════════════ */
:root {
  --blue:    #0A3D67;
  --blue2:   #072e4f;
  --turq:    #5EB1C1;
  --yellow:  #EAB80F;
  --orange:  #D57B16;
  --white:   #ffffff;
  --paper:   #f8f7f4;
  --border:  #ddd8cc;
  --ink:     #1c1c1c;
  --muted:   #6b7280;
  --arobas:  #0A3D67;
  --cosmo:   #5EB1C1;
  --ira2:    #D57B16;
  --siam:    #EAB80F;
  --sans: Arial, "Arial Narrow", sans-serif;
  --title: "Yanone Kaffeesatz", Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); line-height: 1.5; }

/* ── DÉGRADÉ INSTITUTIONNEL ── */
.gradient-bar { height: 4px; background: linear-gradient(to right, var(--blue) 0%, var(--turq) 40%, var(--yellow) 70%, var(--orange) 100%); }

/* ── HEADER ── */
header {
  background: var(--blue);
  color: #fff;
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logos { display: flex; align-items: center; gap: 12px; }
.logo-ibisc-text {
  font-family: var(--title);
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.logo-sep { width: 1px; height: 28px; background: rgba(255,255,255,.3); }
.logo-evry { height: 28px; opacity: .9; }
.header-title {
  font-family: var(--sans);
  font-size: 13px;
  color: rgba(255,255,255,.7);
  margin-left: 4px;
}
#back-btn {
  margin-left: auto;
  color: rgba(255,255,255,.75);
  font-size: 12px;
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 3px;
  cursor: pointer;
  background: none;
  font-family: var(--sans);
  display: none;
}
#back-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

/* ── FILTER BAR ── */
.filterbar {
  background: var(--white);
  border-bottom: 2px solid var(--blue);
  padding: 10px 28px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 20;
}
.search-wrap { position: relative; flex: 0 0 220px; }
.search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-wrap input {
  width: 100%;
  padding: 6px 10px 6px 28px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 13px;
  font-family: var(--sans);
  background: var(--paper);
  outline: none;
}
.search-wrap input:focus { border-color: var(--blue); background: var(--white); }
.filter-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; margin-right: 2px; }
.chip {
  padding: 3px 11px;
  border-radius: 2px;
  border: 1px solid var(--border);
  background: var(--white);
  font-size: 12px;
  cursor: pointer;
  color: var(--ink);
  font-family: var(--sans);
  transition: all .15s;
  font-weight: 500;
}
.chip:hover { border-color: var(--blue); color: var(--blue); }
.chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.chip[data-team="AROBAS"].active { background: var(--arobas); border-color: var(--arobas); }
.chip[data-team="COSMO"].active  { background: var(--cosmo);  border-color: var(--cosmo); }
.chip[data-team="IRA2"].active   { background: var(--ira2);   border-color: var(--ira2); }
.chip[data-team="SIAM"].active   { background: var(--siam);   border-color: var(--siam); color: var(--ink); }
.count-info { margin-left: auto; font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ── TABLE ── */
.table-wrap { padding: 20px 28px; }
table { width: 100%; border-collapse: collapse; background: var(--white); box-shadow: 0 1px 4px rgba(0,0,0,.07); }
thead { background: var(--blue); }
th {
  padding: 9px 13px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  text-transform: uppercase;
  letter-spacing: .5px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.1);
}
th:last-child { border-right: none; }
th:hover { color: #fff; }
th.sorted { color: var(--yellow); }
.sort-arrow { margin-left: 4px; opacity: .5; font-size: 10px; }
th.sorted .sort-arrow { opacity: 1; }
td { padding: 9px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover td { background: rgba(10,61,103,.04); }

.member-cell { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.member-name { font-weight: 600; font-size: 13px; color: var(--ink); }
.member-firstname { font-size: 12px; color: var(--muted); }

.team-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  margin: 1px;
  letter-spacing: .3px;
}
.tb-AROBAS { background: var(--arobas); }
.tb-COSMO  { background: var(--cosmo); }
.tb-IRA2   { background: var(--ira2); }
.tb-SIAM   { background: var(--siam); color: var(--ink); }

.pos-label { font-size: 12px; color: var(--muted); }
.since-label { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

.links-cell { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.lnk-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  text-decoration: none; font-size: 9px; font-weight: 800;
  border: 1.5px solid transparent; transition: transform .15s;
}
.lnk-dot:hover { transform: scale(1.2); }
.ld-hal { background: #e3f0f9; color: #1a6ea5; border-color: #b0cfea; }
.ld-orc { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.ld-li  { background: #e8f0fc; color: #0a66c2; border-color: #b8ccf0; }
.ld-rg  { background: #e6f4f1; color: #00a187; border-color: #b0dfd8; }
.ld-gs  { background: #fff3e0; color: #b84a00; border-color: #f0cfa8; }

.empty-row { text-align: center; padding: 48px; color: var(--muted); display: none; }

/* ── MEMBER VIEW ── */
#view-member { display: none; }
.member-page {
  max-width: 960px; margin: 28px auto; padding: 0 24px;
  display: grid; grid-template-columns: 260px 1fr; gap: 22px; align-items: start;
}
@media(max-width:700px){ .member-page { grid-template-columns: 1fr; } }

.card {
  background: var(--white);
  border: 1px solid var(--border);
  overflow: hidden;
}
.avatar-block {
  padding: 28px 18px 18px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.big-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 26px; font-weight: 700; margin: 0 auto 14px; color: #fff;
}
.m-name { font-family: var(--title); font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; }
.m-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.m-teams { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }

.meta-list { padding: 13px 16px; }
.meta-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.meta-row:last-child { border-bottom: none; }
.meta-key { color: var(--muted); flex-shrink: 0; margin-right: 8px; }
.meta-val { font-weight: 500; text-align: right; word-break: break-all; }
.meta-val a { color: var(--blue); text-decoration: none; }
.meta-val a:hover { text-decoration: underline; }

.online-links { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-top: 1px solid var(--border); }
.ol-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 2px; font-size: 11px; font-weight: 600;
  text-decoration: none; transition: all .15s; white-space: nowrap;
  border: 1.5px solid transparent;
}
.ol-btn:hover { transform: translateY(-1px); }
.ol-hal { background: #e3f0f9; color: #1a6ea5; border-color: #b0cfea; }
.ol-orc { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
.ol-li  { background: #e8f0fc; color: #0a66c2; border-color: #b8ccf0; }
.ol-rg  { background: #e6f4f1; color: #00a187; border-color: #b0dfd8; }
.ol-gs  { background: #fff3e0; color: #b84a00; border-color: #f0cfa8; }

.right-col { display: flex; flex-direction: column; gap: 18px; }
.section-card { background: var(--white); border: 1px solid var(--border); overflow: hidden; }
.section-head {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,61,103,.03);
}
.section-head h2 { font-family: var(--title); font-size: 16px; font-weight: 600; color: var(--blue); }
.section-body { padding: 14px 16px; }

.thesis-item {
  background: var(--paper); border: 1px solid var(--border);
  padding: 11px 14px; margin-bottom: 8px;
}
.thesis-item:last-child { margin-bottom: 0; }
.thesis-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 5px; color: var(--ink); }
.thesis-sub { font-size: 11px; color: var(--muted); }
.thesis-status {
  display: inline-block; padding: 2px 7px; border-radius: 2px;
  font-size: 10px; font-weight: 700; color: #fff;
  background: var(--blue);
}
.thesis-link { color: var(--blue); text-decoration: none; font-size: 11px; margin-left: 6px; }
.thesis-link:hover { text-decoration: underline; }

.lang-switch { display: flex; gap: 3px; margin-left: 12px; }
.lang-btn {
  padding: 3px 9px; border: 1px solid rgba(255,255,255,.35);
  border-radius: 2px; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,.65); cursor: pointer; background: none;
  font-family: var(--sans); transition: all .15s;
}
.lang-btn.active { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.6); }
.lang-btn:hover { color: #fff; }
footer {
  background: linear-gradient(to right, var(--blue) 0%, var(--turq) 40%, var(--yellow) 70%, var(--orange) 100%);
  height: 6px;
  margin-top: 48px;
}
</style>
</head>
<body>

<div class="gradient-bar"></div>

<header>
  <div class="header-logos">
    <span class="logo-ibisc-text">IBISC</span>
    <div class="logo-sep"></div>
    <!-- Logo Évry texte substitut (SVG non embarqué pour portabilité) -->
    <span style="font-family:var(--sans);font-size:11px;color:rgba(255,255,255,.65);line-height:1.2;">Université<br>Évry Paris-Saclay</span>
  </div>
  <span id="header-sub" class="header-title">Annuaire des membres</span>
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('fr',this)">FR</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
  </div>
  <button id="back-btn" onclick="showList()">← Annuaire</button>
</header>

<!-- ══ VUE LISTE ══ -->
<div id="view-list">
  <div class="filterbar">
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="qinput" placeholder="Nom, prénom…">
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-label" data-key="team">Équipe</span>
      <button class="chip active" data-team="ALL" onclick="setTeam(this)">Toutes</button>
      <button class="chip" data-team="AROBAS" onclick="setTeam(this)">AROBAS</button>
      <button class="chip" data-team="COSMO" onclick="setTeam(this)">COSMO</button>
      <button class="chip" data-team="IRA2" onclick="setTeam(this)">IRA2</button>
      <button class="chip" data-team="SIAM" onclick="setTeam(this)">SIAM</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-label" data-key="presence">Présence</span>
      <button class="chip active" data-presence="ALL" onclick="setPresence(this)">Tous</button>
      <button class="chip" data-presence="ACTIVE" onclick="setPresence(this)">Membres actifs</button>
      <button class="chip" data-presence="FORMER" onclick="setPresence(this)">Anciens membres</button>
    </div>
    <span class="count-info" id="cnt"></span>
  </div>

  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th onclick="sortBy('n')" id="th-n">Nom <span class="sort-arrow" id="sa-n">▲</span></th>
          <th onclick="sortBy('t')" id="th-t">Équipe(s) <span class="sort-arrow" id="sa-t"></span></th>
          <th onclick="sortBy('p')" id="th-p">Fonction <span class="sort-arrow" id="sa-p"></span></th>
          <th onclick="sortBy('yr')" id="th-yr">Depuis <span class="sort-arrow" id="sa-yr"></span></th>
          <th>Liens</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-row" id="empty-row">Aucun membre ne correspond à ces critères.</div>
  </div>
</div>

<!-- ══ VUE FICHE ══ -->
<div id="view-member">
  <div class="member-page">
    <div>
      <div class="card">
        <div class="avatar-block">
          <div class="big-avatar" id="m-avatar"></div>
          <div class="m-name" id="m-name"></div>
          <div class="m-title" id="m-position"></div>
          <div class="m-teams" id="m-teams"></div>
        </div>
        <div class="meta-list" id="m-meta"></div>
        <div class="online-links" id="m-links"></div>
      </div>
    </div>
    <div class="right-col" id="m-right"></div>
  </div>
</div>

<footer></footer>

}

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Mettre à jour les textes statiques de l'interface
  const t = T[l];
  document.getElementById('qinput').placeholder = t.search_ph;
  document.querySelector('[data-team="ALL"]').textContent   = t.all_teams;
  document.querySelector('[data-presence="ALL"]').textContent    = t.all_presence;
  document.querySelector('[data-presence="ACTIVE"]').textContent = t.active;
  document.querySelector('[data-presence="FORMER"]').textContent = t.former;
  document.querySelector('.filter-label[data-key="team"]').textContent     = t.team_label;
  document.querySelector('.filter-label[data-key="presence"]').textContent = t.presence_label;
  document.getElementById('th-n').childNodes[0].textContent  = t.col_name + ' ';
  document.getElementById('th-t').childNodes[0].textContent  = t.col_team + ' ';
  document.getElementById('th-p').childNodes[0].textContent  = t.col_pos + ' ';
  document.getElementById('th-yr').childNodes[0].textContent = t.col_since + ' ';
  document.getElementById('back-btn').textContent = t.back;
  // Mettre à jour le header sub si on est sur la liste
  if (document.getElementById('view-list').style.display !== 'none') {
    document.getElementById('header-sub').textContent = t.header_sub;
  }
  document.getElementById('empty-row').textContent = t.empty;
  applyFilters();
}

  const el = document.getElementById('qinput');
  const q = el ? el.value.trim().toLowerCase() : '';
  return MEMBERS.filter(m => {
    if (filterPresence === 'ACTIVE' && !m.a) return false;
    if (filterPresence === 'FORMER' && m.a) return false;
    if (filterTeam !== 'ALL' && !m.t.includes(filterTeam)) return false;
    if (q) {
      const hay = (m.n + ' ' + m.s).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function setTeam(btn) {
  document.querySelectorAll('[data-team]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTeam = btn.dataset.team;
  applyFilters();
}

function setPresence(btn) {
  document.querySelectorAll('[data-presence]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterPresence = btn.dataset.presence;
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  // Update header indicators
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sorted');
    const id = th.id.replace('th-','');
    const sa = document.getElementById('sa-'+id);
    if (sa) sa.textContent = '';
  });
  const thEl = document.getElementById('th-'+col);
  const saEl = document.getElementById('sa-'+col);
  if (thEl) thEl.classList.add('sorted');
  if (saEl) saEl.textContent = sortAsc ? '▲' : '▼';
  applyFilters();
}

/* ── ESCAPE HTML ── */
function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function initials(m) {
  const fn = m.s ? m.s[0] : '';
  const ln = m.n ? m.n[0] : '';
  return (fn + ln).toUpperCase();
}
function avatarColor(m) {
  if (m.t && m.t.length) return TEAM_COLORS[m.t[0]] || '#0A3D67';
  if (!m.a) return '#9ca3af';
  return '#0A3D67';
}

/* ── RENDU TABLEAU ── */
function applyFilters() {
  if (!MEMBERS || !MEMBERS.length) return;
  let data = getFiltered();
  // Sort
  data.sort((a,b) => {
    // Actifs toujours avant anciens
    if (a.a !== b.a) return a.a ? -1 : 1;

    if (sortCol === 't') {
      // Tri par équipe : d'abord l'équipe (alpha), puis nom dans chaque équipe
      const ta = (a.t && a.t.length) ? a.t[0] : 'ZZZZ';
      const tb = (b.t && b.t.length) ? b.t[0] : 'ZZZZ';
      const cmp = sortAsc ? ta.localeCompare(tb,'fr') : tb.localeCompare(ta,'fr');
      if (cmp !== 0) return cmp;
      return a.n.localeCompare(b.n, 'fr');
    }
    if (sortCol === 'p') {
      // Tri par fonction : ordre hiérarchique, puis nom
      const oa = posOrder(a.p), ob = posOrder(b.p);
      const cmp = sortAsc ? oa - ob : ob - oa;
      if (cmp !== 0) return cmp;
      return a.n.localeCompare(b.n, 'fr');
    }

    let va = a[sortCol], vb = b[sortCol];
    if (Array.isArray(va)) va = va.join(',');
    if (Array.isArray(vb)) vb = vb.join(',');
    va = String(va||'').toLowerCase();
    vb = String(vb||'').toLowerCase();
    return sortAsc ? va.localeCompare(vb,'fr') : vb.localeCompare(va,'fr');
  });

  const tbody = document.getElementById('tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  document.getElementById('empty-row').style.display = data.length ? 'none' : 'block';

  data.forEach(m => {
    const tr = document.createElement('tr');
    if (m.a) tr.onclick = () => showMember(m.id);
    else tr.style.cursor = 'default';

    // Nom
    const color = avatarColor(m);
    const inits = initials(m);
    const formerStyle = !m.a ? 'opacity:.6;font-style:italic;' : '';

    if (!m.a) {
      // ── Ancien membre : nom/prénom + date de départ + après ──
      const endLabel = m.end
        ? (lang === 'fr' ? `Départ&nbsp;: ${m.end.replace('-','/')}` : `Left&nbsp;: ${m.end.replace('-','/')}`)
        : '';
      const afterLabel = m.after
        ? `<span style="color:var(--muted);font-size:11px;margin-left:8px;">${esc(m.after)}</span>`
        : '';
      tr.innerHTML = `
        <td colspan="5" style="${formerStyle}padding:8px 13px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="avatar" style="background:var(--muted);width:28px;height:28px;font-size:10px;">${esc(initials(m))}</div>
            <span style="font-weight:600;font-size:13px;">${esc(m.n)}</span>
            <span style="font-size:12px;color:var(--muted);">${esc(m.s)}</span>
            ${endLabel ? `<span style="font-size:11px;color:var(--muted);margin-left:4px;">&mdash; ${endLabel}</span>` : ''}
            ${afterLabel}
          </div>
        </td>
      `;
    } else {
      // ── Membre actif : affichage complet ──
      tr.innerHTML = `
        <td>
          <div class="member-cell">
            <div class="avatar" style="background:${color}">${esc(initials(m))}</div>
            <div>
              <div class="member-name">${esc(m.n)}</div>
              <div class="member-firstname">${esc(m.s)}</div>
            </div>
          </div>
        </td>
        <td>${(m.t||[]).map(t=>`<span class="team-badge tb-${t}">${t}</span>`).join('')}</td>
        <td class="pos-label">${esc(posLabel(m))}</td>
        <td class="since-label">${esc(m.yr)||'—'}</td>
        <td>${renderLinks(m)}</td>
      `;
    }
    tbody.appendChild(tr);
    // Empêcher les clics sur les liens de déclencher showMember
    tr.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', e => e.stopPropagation());
    });
  });

  document.getElementById('cnt').textContent = T[lang].members_count(data.length);
}

function renderLinks(m) {
  let html = '<div class="links-cell">';
  if (m.hal) html += `<a class="lnk-dot ld-hal" href="${m.hal}" target="_blank" title="HAL">H</a>`;
  if (m.orc) html += `<a class="lnk-dot ld-orc" href="https://orcid.org/${m.orc}" target="_blank" title="ORCID">O</a>`;
  if (m.li)  html += `<a class="lnk-dot ld-li"  href="${m.li}"  target="_blank" title="LinkedIn">L</a>`;
  if (m.rg)  html += `<a class="lnk-dot ld-rg"  href="${m.rg}"  target="_blank" title="ResearchGate">R</a>`;
  if (m.gs)  html += `<a class="lnk-dot ld-gs"  href="${m.gs}"  target="_blank" title="Google Scholar">G</a>`;
  html += '</div>';
  return html;
}

/* ── VUE FICHE ── */
function showList() {
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('view-member').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-sub').textContent = T[lang].header_sub;
}

function showMember(id) {
  const m = MEMBERS.find(x => x.id === id);
  if (!m) return;

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-member').style.display = 'block';
  document.getElementById('back-btn').style.display = 'inline-block';
  document.getElementById('back-btn').textContent = T[lang].back;
  document.getElementById('header-sub').textContent = m.fn;

  // Avatar
  const color = avatarColor(m);
  document.getElementById('m-avatar').style.background = color;
  document.getElementById('m-avatar').textContent = initials(m);
  document.getElementById('m-name').textContent = m.fn;
  document.getElementById('m-position').textContent = posLabel(m);

  // Teams
  const teamsEl = document.getElementById('m-teams');
  teamsEl.innerHTML = (m.t||[]).map(t=>`<span class="team-badge tb-${t}">${t}</span>`).join('');

  // Meta
  const t = T[lang];
  const meta = document.getElementById('m-meta');
  let rows = '';
  if (m.em) rows += `<div class="meta-row"><span class="meta-key">${t.email_lbl}</span><span class="meta-val"><a href="mailto:${m.em}">${m.em}</a></span></div>`;
  if (m.b)  rows += `<div class="meta-row"><span class="meta-key">${t.building_lbl}</span><span class="meta-val">${m.b}${m.r?' — '+m.r:''}</span></div>`;
  if (m.yr) rows += `<div class="meta-row"><span class="meta-key">${t.ibisc_since}</span><span class="meta-val">${m.yr}</span></div>`;
  if (m.hdr) rows += `<div class="meta-row"><span class="meta-key">${t.hdr_label}</span><span class="meta-val">${t.hdr_val}</span></div>`;
  meta.innerHTML = rows;

  // Liens en ligne
  const linksEl = document.getElementById('m-links');
  let lhtml = '';
  if (m.hal) lhtml += `<a class="ol-btn ol-hal" href="${m.hal}" target="_blank">HAL</a>`;
  if (m.orc) lhtml += `<a class="ol-btn ol-orc" href="https://orcid.org/${m.orc}" target="_blank">ORCID</a>`;
  if (m.li)  lhtml += `<a class="ol-btn ol-li"  href="${m.li}"  target="_blank">LinkedIn</a>`;
  if (m.rg)  lhtml += `<a class="ol-btn ol-rg"  href="${m.rg}"  target="_blank">ResearchGate</a>`;
  if (m.gs)  lhtml += `<a class="ol-btn ol-gs"  href="${m.gs}"  target="_blank">Google Scholar</a>`;
  linksEl.innerHTML = lhtml || '<span style="font-size:12px;color:var(--muted)">Aucun profil en ligne renseigné</span>';

  // Colonne droite : pas de thèses dans la vue générale
  document.getElementById('m-right').innerHTML = `
    <div class="section-card">
      <div class="section-head"><h2>${t.section_pubs}</h2></div>
      <div class="section-body">
        ${m.hal
          ? `<p style="font-size:13px;color:var(--muted);margin-bottom:10px;">${t.section_pubs} :</p>
             <a href="${m.hal}" target="_blank" class="ol-btn ol-hal" style="display:inline-flex;">${t.pub_hal}</a>`
          : `<p style="font-size:13px;color:var(--muted);">${t.pub_none}</p>`
        }
      </div>
    </div>
    <div class="section-card">
      <div class="section-head"><h2>${t.section_perso}</h2></div>
      <div class="section-body">
        <p style="font-size:13px;color:var(--muted);">${t.perso_soon}</p>
      </div>
    </div>
  `;
}

/* ── INIT ── */
document.getElementById('view-list').style.display = 'block';
document.getElementById('qinput').addEventListener('input', applyFilters);
sortCol = '';
sortBy('n');
</script>
</body>
