<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IBISC — Publications 2018–2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--surface:#181C25;--surface2:#1E2333;--border:#2A2F42;
  --text:#E8EAF0;--muted:#7B80A0;--accent:#4F8EF7;--accent2:#A78BFA;
  --q1:#34D399;--q2:#60A5FA;--q3:#FBBF24;--q4:#F87171;
  --top10:#FFD700;
  --arobas:#F472B6;--cosmo:#34D399;--ira2:#F97316;--siam:#60A5FA;--evr:#A78BFA;
  --font:'Syne','Segoe UI',sans-serif;--mono:'DM Mono','JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0F1117 0%,#181C40 100%);border-bottom:1px solid var(--border);
  padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;
  align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.5px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.hdr-nav{display:flex;gap:6px}
.nav-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.15s all}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.hdr-link{padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:600;text-decoration:none;transition:.15s all}
.hdr-link:hover{border-color:var(--accent2);color:var(--accent2)}

/* VUES */
.view{display:none;padding:28px 32px;max-width:1280px;margin:0 auto}
.view.active{display:block}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;transition:.2s all}
.kpi-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.kpi-val{font-size:32px;font-weight:800;font-family:var(--mono);line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-val.gold{background:linear-gradient(135deg,#FFD700,#FFA500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono);letter-spacing:.05em}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:16px;font-family:var(--mono)}

/* Barres évolution */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-year{font-family:var(--mono);font-size:11px;color:var(--muted);width:36px;text-align:right}
.bar-track{flex:1;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 10px;
  font-size:11px;font-weight:700;font-family:var(--mono);color:#fff;transition:width 1s ease;white-space:nowrap}
.bar-fill.total{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.bar-fill.top10{background:linear-gradient(90deg,#F59E0B,#FFD700)}
.bar-fill.q1{background:linear-gradient(90deg,var(--q1),#6EE7B7)}
.bar-nums{font-family:var(--mono);font-size:11px;color:var(--muted);width:60px;text-align:right}

/* Équipes */
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.team-card{background:var(--surface2);border-radius:10px;padding:14px 16px;border-left:3px solid transparent}
.team-card.AROBAS{border-color:var(--arobas)}
.team-card.COSMO{border-color:var(--cosmo)}
.team-card.IRA2{border-color:var(--ira2)}
.team-card.SIAM{border-color:var(--siam)}
.team-name{font-size:13px;font-weight:700;margin-bottom:8px}
.team-stats{display:flex;flex-direction:column;gap:3px}
.team-stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.team-stat-val{font-family:var(--mono);color:var(--text);font-weight:600}

/* TABLEAU ARTICLES */
.filters-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filter-group{display:flex;gap:4px}
.fc{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:.12s}
.fc:hover{border-color:var(--accent);color:var(--accent)}
.fc.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fc.top10-f.on{background:#F59E0B;border-color:#F59E0B;color:#fff}
.search-box{flex:1;max-width:280px;padding:7px 12px;border:1px solid var(--border);
  border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font);
  font-size:12px;outline:none;transition:.15s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.count-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}

.pub-list{display:flex;flex-direction:column;gap:8px}
.pub-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;transition:.15s;cursor:default}
.pub-item:hover{border-color:var(--border);background:var(--surface2)}
.pub-item.is-top10{border-left:3px solid var(--top10)}
.pub-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4}
.pub-title a{color:var(--text);text-decoration:none}
.pub-title a:hover{color:var(--accent)}
.pub-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pub-journal{font-size:11px;color:var(--muted);font-style:italic;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono)}
.q-Q1{background:#063B2A;color:var(--q1)}
.q-Q2{background:#0A2A4A;color:var(--q2)}
.q-Q3{background:#3A2800;color:var(--q3)}
.q-Q4{background:#3A0A0A;color:var(--q4)}
.top10-badge{background:#3A2E00;color:var(--top10);padding:2px 8px;border-radius:4px;
  font-size:10px;font-weight:700;font-family:var(--mono)}
.cs-badge{background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:4px;
  font-size:10px;font-family:var(--mono)}
.year-badge{background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:4px;
  font-size:10px;font-family:var(--mono)}
.t-badge{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--mono)}
.t-AROBAS{background:#3D1A2E;color:var(--arobas)}
.t-COSMO{background:#0D2E22;color:var(--cosmo)}
.t-IRA2{background:#2E1A0A;color:var(--ira2)}
.t-SIAM{background:#0A1A3A;color:var(--siam)}
.t-EVR {background:#1E1040;color:var(--evr)}

/* REVUES TOP 10% */
.journal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.journal-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;transition:.15s}
.journal-card:hover{border-color:var(--top10);transform:translateY(-1px)}
.journal-name{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.3}
.journal-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cs-big{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--top10)}
.years-dots{display:flex;gap:3px;margin-top:6px}
.ydot{width:18px;height:18px;border-radius:4px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:8px;
  font-family:var(--mono);color:var(--muted)}
.ydot.has{background:var(--top10);color:#000;font-weight:700}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px}
.pg-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:11px;transition:.12s}
.pg-btn:hover{border-color:var(--accent);color:var(--accent)}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pg-info{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* Responsive */
@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .team-grid{grid-template-columns:repeat(2,1fr)}
  .hdr{padding:14px 16px}
  .view{padding:16px}
}
</style>
</head>

<script>
  (function() {
    if (sessionStorage.getItem('ibisc_auth') === '1') return;

    const pwd = prompt("Annuaire IBISC\n\nMot de passe requis :", "");

    if (pwd === null || pwd.trim() !== "intranetibisc") {
      document.body.innerHTML = `
            <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f4f0;font-family:system-ui,sans-serif;">
                <h1 style="color:#c62828;margin-bottom:16px;">Accès refusé</h1>
                <p style="font-size:17px;color:#555;margin-bottom:30px;">Le mot de passe saisi est incorrect ou l'opération a été annulée.</p>
                <button onclick="location.reload()"
                        style="padding:14px 32px;font-size:16px;background:#0044cc;color:white;border:none;border-radius:8px;cursor:pointer;">
                    Réessayer
                </button>
            </div>`;
      return;
    }

    sessionStorage.setItem('ibisc_auth', '1');
  })();
</script>

      <div class="chart-title">&#128200; Répartition par quartile</div>
      <div class="bar-chart" id="bar-quartile"></div>

</div>

<!-- ══ ARTICLES ══════════════════════════════════════════════ -->
<div id="view-articles" class="view">
  <div class="filters-bar">
    <div class="filter-group" id="year-filters"></div>
    <div class="filter-group" id="team-filters"></div>
    <div class="filter-group" id="q-filters"></div>
    <button class="fc top10-f" id="f-top10" onclick="toggleTop10()">⭐ TOP 10%</button>

  </div>
  <div class="pub-list" id="pub-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- ══ TOP 10% ══════════════════════════════════════════════ -->
<div id="view-top10" class="view">
  <div class="kpi-grid" id="kpi-top10"></div>
  <div class="filters-bar">
    <div class="filter-group" id="top10-team-filters"></div>
    <input class="search-box" type="text" id="top10-search" placeholder="Nom de revue…" oninput="filterJournals()">
    <span class="count-lbl" id="top10-count"></span>
  </div>
  <div class="journal-grid" id="journal-grid"></div>
</div>

var YEARS = [2018,2019,2020,2021,2022,2023,2024,2025,2026];
var TEAMS = ['AROBAS','COSMO','IRA2','SIAM'];
var TCOL  = {AROBAS:'var(--arobas)',COSMO:'var(--cosmo)',IRA2:'var(--ira2)',SIAM:'var(--siam)'};

/* ══ NAVIGATION ══ */
function showView(id, btn) {
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('view-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

/* ══ DASHBOARD ══ */
function buildDashboard() {
  var total = PUBS.length;
  var q1    = PUBS.filter(function(p){return p.q==='Q1'}).length;
  var top10 = PUBS.filter(function(p){return p.top10}).length;
  var cs_vals = PUBS.map(function(p){return parseFloat(p.citescore)}).filter(function(v){return !isNaN(v)});
  var cs_max  = Math.max.apply(null,cs_vals);
  var cs_avg  = (cs_vals.reduce(function(a,b){return a+b},0)/cs_vals.length).toFixed(1);
  var pct_q1  = Math.round(q1/total*100);

  var kpis = [
    {val:total,    lbl:'Articles publiés'},
    {val:q1,       lbl:'Articles Q1'},
    {val:top10+'', lbl:'TOP 10% CiteScore', gold:true},
    {val:pct_q1+'%', lbl:'% en Q1'},
    {val:cs_avg,   lbl:'CiteScore moyen'},
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(function(k){
    return '<div class="kpi-card"><div class="kpi-val'+(k.gold?' gold':'')+'">'+k.val+'</div><div class="kpi-lbl">'+k.lbl+'</div></div>';
  }).join('');

  // Évolution par année
  var maxTotal = Math.max.apply(null, YEARS.map(function(y){
    return PUBS.filter(function(p){return p.year===y}).length;
  }));
  var evHtml = YEARS.map(function(y){
    var ps   = PUBS.filter(function(p){return p.year===y});
    var t10  = ps.filter(function(p){return p.top10}).length;
    var pct  = Math.round(ps.length/maxTotal*100);
    var p10  = Math.round(t10/maxTotal*100);
    return '<div class="bar-row">'+
      '<span class="bar-year">'+y+'</span>'+
      '<div class="bar-track">'+
        '<div class="bar-fill total" style="width:'+pct+'%">'+ps.length+' articles</div>'+
      '</div>'+
      '<div class="bar-track" style="width:140px;flex:none">'+
        '<div class="bar-fill top10" style="width:'+Math.round(t10/ps.length*100)+'%">'+t10+' TOP 10%</div>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('bar-evolution').innerHTML = evHtml;

  // Équipes
  var teamHtml = TEAMS.map(function(t){
    var ps  = PUBS.filter(function(p){return p.teams.indexOf(t)>=0});
    var q1t = ps.filter(function(p){return p.q==='Q1'}).length;
    var t10t= ps.filter(function(p){return p.top10}).length;
    var cs  = ps.map(function(p){return parseFloat(p.citescore)}).filter(function(v){return !isNaN(v)});
    var csm = cs.length?(cs.reduce(function(a,b){return a+b},0)/cs.length).toFixed(1):'—';
    return '<div class="team-card '+t+'">'+
      '<div class="team-name" style="color:'+TCOL[t]+'">'+t+'</div>'+
      '<div class="team-stats">'+
        '<div class="team-stat-row"><span>Total</span><span class="team-stat-val">'+ps.length+'</span></div>'+
        '<div class="team-stat-row"><span>Q1</span><span class="team-stat-val">'+q1t+'</span></div>'+
        '<div class="team-stat-row"><span>TOP 10%</span><span class="team-stat-val">'+t10t+'</span></div>'+
        '<div class="team-stat-row"><span>CS moyen</span><span class="team-stat-val">'+csm+'</span></div>'+
      '</div></div>';
  }).join('');
  document.getElementById('team-grid').innerHTML = teamHtml;

  // Quartiles
  var qData = ['Q1','Q2','Q3','Q4',''].map(function(q){
    var n = PUBS.filter(function(p){return p.q===q}).length;
    var lbl = q||'Non classé';
    var col = q==='Q1'?'var(--q1)':q==='Q2'?'var(--q2)':q==='Q3'?'var(--q3)':q==='Q4'?'var(--q4)':'var(--muted)';
    return {lbl:lbl, n:n, col:col};
  });
  var maxQ = Math.max.apply(null, qData.map(function(q){return q.n}));
  document.getElementById('bar-quartile').innerHTML = qData.map(function(q){
    var pct = Math.round(q.n/maxQ*100);
    return '<div class="bar-row">'+
      '<span class="bar-year" style="width:60px;font-size:10px">'+q.lbl+'</span>'+
      '<div class="bar-track">'+
        '<div class="bar-fill" style="width:'+pct+'%;background:'+q.col+'">'+q.n+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

/* ══ ARTICLES ══ */
var artPage = 1;
var artPerPage = 30;
var fYear = 'all', fTeam = 'all', fQ = 'all', fTop10 = false;

function buildArticleFilters() {
  // Années
  var yHtml = `<button class="fc on" onclick="setArtFilter('year','all',this)">Toutes</button>`;
  YEARS.forEach(function(y){
    yHtml += `<button class="fc" onclick="setArtFilter('year','${y}',this)">${y}</button>`;
  });
  document.getElementById('year-filters').innerHTML = yHtml;

  // Équipes
  var tHtml = '<button class="fc on" onclick="setArtFilter(\'team\',\'all\',this)">Toutes</button>';
  TEAMS.forEach(function(t){
    tHtml += '<button class="fc" onclick="setArtFilter(\'team\',\'' + t + '\',this)">' + t + '</button>';
  });
  document.getElementById('team-filters').innerHTML = tHtml;

  // Quartiles
  var qHtml = '<button class="fc on" onclick="setArtFilter(\'q\',\'all\',this)">Tous</button>';
  ['Q1','Q2','Q3'].forEach(function(q){
    qHtml += `<button class="fc" onclick="setArtFilter('q','${q}',this)">${q}</button>`;
  });
  document.getElementById('q-filters').innerHTML = qHtml;
}

function setArtFilter(type, val, btn) {
  if(type==='year') fYear=val;
  else if(type==='team') fTeam=val;
  else if(type==='q') fQ=val;
  // Reset sibling buttons
  var group = btn.parentElement;
  group.querySelectorAll('.fc').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  artPage=1; filterArticles();
}

function toggleTop10() {
  fTop10 = !fTop10;
  var btn = document.getElementById('f-top10');
  btn.classList.toggle('on', fTop10);
  artPage=1; filterArticles();
}

function filterArticles() {
  var q = document.getElementById('art-search').value.toLowerCase().trim();
  var filtered = PUBS.filter(function(p){
    if(fYear!=='all' && p.year!==fYear) return false;
    if(fTeam!=='all' && p.teams.indexOf(fTeam)<0) return false;
    if(fQ!=='all' && p.q!==fQ) return false;
    if(fTop10 && !p.top10) return false;
    if(q && (p.title.toLowerCase().indexOf(q)<0 && p.journal.toLowerCase().indexOf(q)<0)) return false;
    return true;
  });
  // Trier par CS décroissant puis année décroissante
  filtered.sort(function(a,b){
    var ca=parseFloat(a.citescore)||0, cb=parseFloat(b.citescore)||0;
    if(cb!==ca) return cb-ca;
    return b.year-a.year;
  });
  document.getElementById('art-count').textContent = filtered.length+' article'+(filtered.length>1?'s':'');
  renderArticles(filtered);
}

function renderArticles(filtered) {
  var total = filtered.length;
  var pages = Math.ceil(total/artPerPage);
  if(artPage>pages) artPage=1;
  var slice = filtered.slice((artPage-1)*artPerPage, artPage*artPerPage);

  document.getElementById('pub-list').innerHTML = slice.map(function(p){
    var tBadges = p.teams.map(function(t){
      return '<span class="t-badge t-'+t.replace('@','\\40')+'">'+t+'</span>';
    }).join('');
    var qPill = p.q?'<span class="q-pill q-'+p.q+'">'+p.q+'</span>':'';
    var top10b = p.top10?'<span class="top10-badge">★ TOP 10%</span>':'';
    var cs = p.citescore?'<span class="cs-badge">CS '+p.citescore+'</span>':'';
    var titleHtml = p.hal_url
      ? '<a href="'+p.hal_url+'" target="_blank">'+e(p.title)+'</a>'
      : e(p.title);
    return '<div class="pub-item'+(p.top10?' is-top10':'')+'">'+
      '<div class="pub-title">'+titleHtml+'</div>'+
      '<div class="pub-meta">'+
        '<span class="pub-journal">'+e(p.journal)+'</span>'+
        qPill+top10b+cs+
        '<span class="year-badge">'+p.year+'</span>'+
        tBadges+
      '</div></div>';
  }).join('') || '<div style="text-align:center;padding:40px;color:var(--muted)">Aucun article trouvé</div>';

  // Pagination
  var pgHtml = '';
  if(pages>1){
    pgHtml += '<button class="pg-btn" onclick="goPage('+(artPage-1)+')" '+(artPage<=1?'disabled':'')+'>‹</button>';
    for(var i=1;i<=pages;i++){
      if(i===1||i===pages||Math.abs(i-artPage)<=1){
        pgHtml += '<button class="pg-btn'+(i===artPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
      } else if(Math.abs(i-artPage)===2){
        pgHtml += '<span class="pg-info">…</span>';
      }
    }
    pgHtml += '<button class="pg-btn" onclick="goPage('+(artPage+1)+')" '+(artPage>=pages?'disabled':'')+'>›</button>';
    pgHtml += '<span class="pg-info" style="margin-left:8px">'+artPage+'/'+pages+'</span>';
  }
  document.getElementById('pagination').innerHTML = pgHtml;

  function goPage(p){if(p>=1&&p<=pages){artPage=p;renderArticles(filtered);window.scrollTo(0,120);}}
  window.goPage = goPage;
}

function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ══ TOP 10% REVUES ══ */
function buildTop10() {
  var total = JOURNALS.length;
  var arts  = JOURNALS.reduce(function(s,j){return s+parseInt(j.n_articles||0)},0);
  var cs_max = Math.max.apply(null, JOURNALS.map(function(j){return parseFloat(j.citescore)||0}));
  var teams_set = {};
  JOURNALS.forEach(function(j){j.teams.forEach(function(t){teams_set[t]=1})});

  document.getElementById('kpi-top10').innerHTML = [
    {val:total,   lbl:'Revues TOP 10%'},
    {val:arts,    lbl:'Articles publiés'},
    {val:cs_max,  lbl:'CiteScore max', gold:true},
    {val:9,       lbl:'Années couvertes'},
    {val:TEAMS.length, lbl:'Équipes impliquées'},
  ].map(function(k){
    return '<div class="kpi-card"><div class="kpi-val'+(k.gold?' gold':'')+'">'+k.val+'</div><div class="kpi-lbl">'+k.lbl+'</div></div>';
  }).join('');

  // Filtres équipes
  var tHtml = `<button class="fc on" onclick="setTop10Team('all',this)">Toutes équipes</button>`;
  Object.keys(teams_set).sort().forEach(function(t){
    tHtml += `<button class="fc" onclick="setTop10Team('${t}',this)">${t}</button>`;
  });
  document.getElementById('top10-team-filters').innerHTML = tHtml;
  filterJournals();
}

var top10Team = 'all';
function setTop10Team(t, btn) {
  top10Team = t;
  btn.parentElement.querySelectorAll('.fc').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  filterJournals();
}

function filterJournals() {
  var q = (document.getElementById('top10-search').value||'').toLowerCase().trim();
  var filtered = JOURNALS.filter(function(j){
    if(top10Team!=='all' && j.teams.indexOf(top10Team)<0) return false;
    if(q && j.journal.toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  filtered.sort(function(a,b){return (parseFloat(b.citescore)||0)-(parseFloat(a.citescore)||0)});
  document.getElementById('top10-count').textContent = filtered.length+' revue'+(filtered.length>1?'s':'');

  var allYears = [2018,2019,2020,2021,2022,2023,2024,2025,2026];
  document.getElementById('journal-grid').innerHTML = filtered.map(function(j){
    var tBadges = j.teams.map(function(t){
      return '<span class="t-badge t-'+t.replace('@','\\40')+'">'+t+'</span>';
    }).join('');
    var qPill = j.q?'<span class="q-pill q-'+j.q+'">'+j.q+'</span>':'';
    var dots = allYears.map(function(y){
      var has = j.years.indexOf(String(y))>=0;
      return '<div class="ydot'+(has?' has':'')+'">'+String(y).slice(2)+'</div>';
    }).join('');
    return '<div class="journal-card">'+
      '<div class="journal-name">'+e(j.journal)+'</div>'+
      '<div class="journal-meta">'+
        '<span class="cs-big">'+j.citescore+'</span>'+
        qPill+
        '<span class="cs-badge">'+j.n_articles+' art.</span>'+
        tBadges+
      '</div>'+
      '<div class="years-dots">'+dots+'</div>'+
    '</div>';
  }).join('') || '<div style="text-align:center;padding:40px;color:var(--muted)">Aucune revue trouvée</div>';
}

/* ══ INIT ══ */
buildDashboard();
buildArticleFilters();
filterArticles();
buildTop10();
</script>
